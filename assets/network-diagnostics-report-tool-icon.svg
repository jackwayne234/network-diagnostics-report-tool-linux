<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Network Diagnostics Report Tool icon">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#12385c"/>
      <stop offset="1" stop-color="#0b2239"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#00121f" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>

  <!-- report page -->
  <g filter="url(#shadow)">
    <rect x="138" y="88" width="236" height="336" rx="18" fill="#ecf9f7"/>
    <path d="M318 88 L374 144 L318 144 Z" fill="#c9e6e4"/>
  </g>

  <!-- status dots -->
  <circle cx="180" cy="124" r="8" fill="#26bfae"/>
  <circle cx="220" cy="124" r="8" fill="#ffcd56"/>
  <circle cx="260" cy="124" r="8" fill="#ff6767"/>

  <!-- report lines -->
  <rect x="174" y="172" width="156" height="14" rx="7" fill="#4c6982"/>
  <rect x="174" y="212" width="180" height="14" rx="7" fill="#4c6982"/>
  <rect x="174" y="252" width="132" height="14" rx="7" fill="#4c6982"/>
  <rect x="174" y="292" width="165" height="14" rx="7" fill="#4c6982"/>

  <!-- network graph -->
  <g stroke="#26bfae" stroke-width="8" stroke-linecap="round">
    <line x1="180" y1="348" x2="256" y2="318"/>
    <line x1="256" y1="318" x2="332" y2="348"/>
    <line x1="256" y1="318" x2="256" y2="384"/>
    <line x1="180" y1="348" x2="256" y2="384"/>
    <line x1="332" y1="348" x2="256" y2="384"/>
  </g>
  <circle cx="180" cy="348" r="18" fill="#26bfae" stroke="#12385c" stroke-width="5"/>
  <circle cx="256" cy="318" r="18" fill="#26bfae" stroke="#12385c" stroke-width="5"/>
  <circle cx="332" cy="348" r="18" fill="#26bfae" stroke="#12385c" stroke-width="5"/>
  <circle cx="256" cy="384" r="18" fill="#ffcd56" stroke="#12385c" stroke-width="5"/>

  <!-- magnifying glass -->
  <circle cx="140" cy="142" r="48" fill="none" stroke="#26bfae" stroke-width="16"/>
  <line x1="174" y1="176" x2="216" y2="218" stroke="#26bfae" stroke-width="18" stroke-linecap="round"/>
  <circle cx="140" cy="142" r="13" fill="#ffcd56"/>
</svg>
